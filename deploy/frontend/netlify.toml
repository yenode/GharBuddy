[build]
  base    = "Frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://gharbuddy-api.onrender.com"

[[redirects]]
  from   = "/api/*"
  to     = "https://gharbuddy-api.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
